name: docker-publish

# Builds and pushes the titan-mimiron image to Docker Hub.
#
# Triggers:
#   - push to main when something image-affecting changes (VERSION bump,
#     Dockerfile change, source/asset change). Docs-only commits don't
#     re-burn CI.
#   - manual dispatch, with an optional version override for rebuilding
#     a past version (or stamping an arbitrary tag).
#
# Required repo secrets:
#   DOCKERHUB_USERNAME — the Docker Hub account that owns the image
#                        namespace (also used as the namespace for the
#                        pushed image: <username>/titan-mimiron).
#   DOCKERHUB_TOKEN    — Docker Hub access token (NOT the account password).
#                        Create one at https://hub.docker.com/settings/security
#                        with Read & Write scope on the titan-mimiron repo.
#
# If you want to publish under a different namespace (e.g. an org), change
# the NAMESPACE step or replace `${{ secrets.DOCKERHUB_USERNAME }}` in the
# `tags:` block with a hard-coded org name.

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'
      - 'Dockerfile'
      - '.dockerignore'
      - 'index.html'
      - 'style.css'
      - 'src/**'
      - 'nginx/**'
      - 'config.json.template'
      - 'build.sh'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      version_override:
        description: "Tag override (leave blank to use VERSION file)"
        required: false
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          override="${{ github.event.inputs.version_override }}"
          if [ -n "$override" ]; then
            v="$override"
          else
            v="$(tr -d '[:space:]' < VERSION)"
          fi
          if [ -z "$v" ]; then
            echo "::error::Could not resolve a version (VERSION file empty and no override)"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/titan-mimiron:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/titan-mimiron:latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          # GitHub Actions cache keeps subsequent builds fast without
          # touching the registry's layer storage.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed"
            echo ""
            echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/titan-mimiron:${{ steps.version.outputs.version }}\`"
            echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/titan-mimiron:latest\`"
            echo ""
            echo "Platforms: \`linux/amd64\`, \`linux/arm64\`"
          } >> "$GITHUB_STEP_SUMMARY"
